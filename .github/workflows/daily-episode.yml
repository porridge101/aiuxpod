name: Daily episode

on:
  schedule:
    # 19:00 UTC = 5am AEST (Queensland, no DST) Mon-Fri episodes.
    # Runs Sun-Thu UTC because AEST is UTC+10.
    - cron: "0 19 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-episode
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m src.run

      - name: Commit and push episode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add episodes/ feed.xml episodes.json
          if git diff --cached --quiet; then
            echo "Nothing to publish (quiet day)."
            exit 0
          fi
          git commit -m "Episode $(date -u +%Y-%m-%d)"
          git push
